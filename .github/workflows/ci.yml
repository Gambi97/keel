name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type-check and build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit tests
        run: npm test

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Validate generated Terraform
        run: npm run verify:templates

      - name: Dry-run end-to-end
        run: |
          mkdir -p /tmp/csa-dry && cd /tmp/csa-dry
          node $GITHUB_WORKSPACE/dist/index.js --dry-run --yes --name ci-demo
          test -f ci-demo/main.tf
