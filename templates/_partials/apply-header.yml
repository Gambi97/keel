name: Terraform apply

# Non-production environments deploy on every merge to main; production is
# promoted by pushing a version tag (vX.Y.Z), so a merge never touches prod.
# Tag-based promotion is the free, git-native gate (no paid environment rule):
# the tag lives in the repo, is auditable, and rolling back is re-tagging.
on:
  push:
__APPLY_TRIGGERS__

permissions:
  contents: read

concurrency:
  # Serialize all applies against the shared state bucket; a tag deploy and a
  # main deploy never run at the same time.
  group: terraform-apply
  cancel-in-progress: false

env:
  # The Scaleway keys double as S3 credentials for the state backend, so the
  # same secret feeds both variables: one credential, one place to rotate.
  AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
  SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
  SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
  SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
  SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
  INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
  INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
  INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_PROJECT_ID }}
  INFISICAL_HOST: ${{ vars.INFISICAL_HOST }}
  TF_VAR_infisical_client_id: ${{ secrets.INFISICAL_CLIENT_ID }}
  TF_VAR_infisical_client_secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
  TF_VAR_infisical_project_id: ${{ vars.INFISICAL_PROJECT_ID }}
  TF_VAR_infisical_host: ${{ vars.INFISICAL_HOST }}
  TF_IN_AUTOMATION: "true"

jobs:
