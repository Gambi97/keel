name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # npm ci runs "prepare" (build); "prepublishOnly" (lint + test) runs at
      # publish time, so a red release never reaches the registry.
      - run: npm ci

      - name: Check tag matches package version
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ "v$version" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $version" >&2
            exit 1
          fi

      - name: Skip if this version is already on the registry
        id: check
        run: |
          version="$(node -p "require('./package.json').version")"
          if npm view "keel-cli@$version" version >/dev/null 2>&1; then
            echo "already published, skipping"
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with provenance
        if: steps.check.outputs.published == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
